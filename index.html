<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cobrir Suplències — Selecció d'etapa</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0f172a;font-family:'Segoe UI',system-ui,sans-serif;padding:1.5rem;}
  .logo{width:64px;height:64px;background:#2563eb;border-radius:1rem;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.75rem;color:white;margin:0 auto 1.5rem;}
  h1{color:white;font-size:1.5rem;font-weight:800;text-align:center;margin-bottom:0.375rem;}
  .sub{color:#64748b;font-size:0.875rem;text-align:center;margin-bottom:2.5rem;}
  .cards{display:flex;flex-direction:column;gap:0.875rem;width:100%;max-width:360px;}
  .card{display:flex;align-items:center;gap:1rem;padding:1.25rem 1.5rem;border-radius:1.25rem;border:1px solid;text-decoration:none;transition:transform 0.15s,box-shadow 0.15s;cursor:pointer;}
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3);}
  .card-icon{font-size:2rem;flex-shrink:0;}
  .card-text{flex:1;}
  .card-title{font-size:1rem;font-weight:700;margin-bottom:0.125rem;}
  .card-desc{font-size:0.75rem;opacity:0.7;}
  .card-arrow{font-size:1.25rem;opacity:0.5;}
  .infantil{background:#2e1065;border-color:#7c3aed;color:#ede9fe;}
  .primaria{background:#1e3a5f;border-color:#2563eb;color:#dbeafe;}
  .secundaria{background:#064e3b;border-color:#059669;color:#d1fae5;}
  .footer{margin-top:2rem;color:#334155;font-size:0.7rem;text-align:center;}
</style>
</head>
<body>
  <div class="logo">S</div>
  <h1>Cobrir Suplències</h1>
  <p class="sub">Selecciona l'etapa per continuar</p>
  <div class="cards">
    <a href="infantil.html" class="card infantil">
      <span class="card-icon">🌱</span>
      <div class="card-text">
        <div class="card-title">Infantil</div>
        <div class="card-desc">Gestió de suplències d'Infantil</div>
      </div>
      <span class="card-arrow">→</span>
    </a>
    <a href="primaria.html" class="card primaria">
      <span class="card-icon">📚</span>
      <div class="card-text">
        <div class="card-title">Primària</div>
        <div class="card-desc">Gestió de suplències de Primària</div>
      </div>
      <span class="card-arrow">→</span>
    </a>
    <a href="secundaria.html" class="card secundaria">
      <span class="card-icon">🎓</span>
      <div class="card-text">
        <div class="card-title">Secundària</div>
        <div class="card-desc">Gestió de suplències de Secundària</div>
      </div>
      <span class="card-arrow">→</span>
    </a>
  </div>
  <p class="footer">Cobrir Suplències · cada etapa és independent</p>
</body>
</html>
